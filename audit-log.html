<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Audit Log — Maztech Garage</title><link rel="stylesheet" href="styles.css"><script src="mock-data.js"></script><script src="app.js"></script></head><body><div class="app-shell" id="app"></div><script>
(async()=>{const logs=await MockData.getAudit();document.getElementById('app').innerHTML=`${renderSidebar('audit')}<div class="main-area">${renderTopbar([{label:'Maztech Garage',href:'dashboard.html'},{label:'Audit Log'}])}<main class="page-content"><div class="page-header"><div><div class="page-title">Audit Log</div><div class="page-sub">บันทึกการเปลี่ยนแปลงสำคัญ เช่น เปิดจ๊อบ แก้ไขสถานะ รับชำระ เพิ่มอะไหล่ และตั้งค่าระบบ</div></div><div class="header-actions"><button class="btn btn-outline" id="export-log">Export CSV</button></div></div><div class="card table-wrap"><table class="data-table"><thead><tr><th>เวลา</th><th>ผู้ใช้</th><th>Action</th><th>Ref</th><th>รายละเอียด</th></tr></thead><tbody>${logs.map(l=>`<tr><td>${new Date(l.at).toLocaleString('th-TH')}</td><td>${App.esc(l.user)}</td><td><span class="badge badge-blue">${App.esc(l.action)}</span></td><td class="mono">${App.esc(l.ref)}</td><td>${App.esc(l.detail)}</td></tr>`).join('')||'<tr><td colspan="5" class="empty-state">ยังไม่มีประวัติ</td></tr>'}</tbody></table></div></main></div>`;wireGlobalSearch();document.getElementById('export-log').onclick=()=>downloadCSV('maztech-audit-log.csv',logs);})();
</script></body></html>
