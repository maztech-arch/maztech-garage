<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>รายละเอียดงานซ่อม — Maztech Garage</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="mock-data.js"></script>
  <script src="app.js"></script>
</head>
<body>
<div class="app-shell" id="app"></div>
<script>
let CURRENT_JOB;

(async () => renderPage())();

async function renderPage() {
  const params = new URLSearchParams(window.location.search);
  const jobs = await MockData.getJobs();
  const jobId = params.get('id') || (jobs[0] && jobs[0].id);
  if (!jobId) return window.location.href = 'new-job.html';
  CURRENT_JOB = await MockData.getJobDetail(jobId);
  // รองรับทั้ง GAS format (financials.totalSell) และ local format (parts array)
  const fin = CURRENT_JOB.financials && CURRENT_JOB.financials.totalSell !== undefined
    ? { partsTotal: CURRENT_JOB.financials.partsTotal || 0, partsCost: 0, grand: CURRENT_JOB.financials.totalSell || 0, vat: 0, remaining: 0, gp: CURRENT_JOB.financials.totalMargin || 0, gpPct: CURRENT_JOB.financials.marginPct || 0 }
    : calcFinancials(CURRENT_JOB.financials, CURRENT_JOB.parts);

  document.getElementById('app').innerHTML = `
    ${renderSidebar('job-detail')}
    <div class="main-area">
      ${renderTopbar([{ label: 'งานซ่อม', href: 'jobs.html' }, { label: CURRENT_JOB.id, href: 'job-detail.html?id=' + encodeURIComponent(CURRENT_JOB.id) }, { label: 'รายละเอียด' }])}
      <main class="page-content detail-layout">
        <div class="detail-main">
          ${renderJobHeader(CURRENT_JOB)}
          ${renderCustomerSection(CURRENT_JOB)}
          ${renderSymptomsSection(CURRENT_JOB)}
          ${renderPartsSection(CURRENT_JOB)}
          ${renderFinancialsAndHistory(CURRENT_JOB, fin)}
        </div>
        ${renderRightRail(CURRENT_JOB, fin)}
      </main>
    </div>`;
  wireGlobalSearch();
  wireDetailActions();
  if (params.get('edit') === '1') setTimeout(openEditModal, 50);
}

function renderJobHeader(job) {
  return `<div class="page-header">
    <div><div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;"><span style="font-size:18px;font-weight:700;color:var(--heading);">${job.id}</span>${jobStatusBadge[job.jobStatus] || ''}${payStatusBadge[job.payStatus] || ''}<span class="badge badge-gray">${job.reNo || 'ยังไม่มี RE'}</span></div><div class="page-sub" style="margin-top:5px;">เปิดจ๊อบ: ${job.openDate} · นัดรับ: ${job.appointDate} · ผ่านมา ${job.daysOpen} วัน</div></div>
    <div class="header-actions"><button class="btn btn-warn" data-action="status">เปลี่ยนสถานะ</button><button class="btn btn-outline" data-action="print">🖨 เอกสาร</button><button class="btn btn-primary" data-action="payment">💰 บันทึกรับชำระ</button></div>
  </div>`;
}

function renderCustomerSection(job) {
  const c = job.customer, v = job.vehicle;
  return `<div class="card"><div class="card-header"><div class="card-title"><div class="card-icon" style="background:#dbeafe;">👤</div>ข้อมูลลูกค้าและรถ</div><button class="btn btn-outline btn-sm" data-action="edit">แก้ไข</button></div><div class="card-body"><div class="info-grid">
    <div class="info-item"><span class="info-label">ชื่อลูกค้า</span><span class="info-val">${App.esc(c.name)}</span></div>
    <div class="info-item"><span class="info-label">เบอร์โทร</span><span class="info-val">${App.esc(c.phone)}</span></div>
    <div class="info-item"><span class="info-label">LINE / ช่องทางติดต่อ</span><span class="info-val">${App.esc(c.line)}</span></div>
    <div class="info-item"><span class="info-label">ประเภทลูกค้า</span><span class="info-val"><span class="badge badge-purple">${App.esc(c.type)}</span></span></div>
    <div class="info-item"><span class="info-label">ทะเบียนรถ</span><span class="info-val mono">${App.esc(v.plate)}</span></div>
    <div class="info-item"><span class="info-label">รุ่นรถ</span><span class="info-val">${App.esc(v.model)}</span></div>
    <div class="info-item"><span class="info-label">เลขไมล์</span><span class="info-val">${fmt.number(v.mileage)} กม.</span></div>
    <div class="info-item"><span class="info-label">สีรถ</span><span class="info-val">${App.esc(v.color)}</span></div>
    <div class="info-item"><span class="info-label">VIN / หมายเลขตัวถัง</span><span class="info-val mono" style="font-size:11px;">${App.esc(v.vin)}</span></div>
    <div class="info-item"><span class="info-label">เจ้าของ</span><span class="info-val">${App.esc(v.owner)}</span></div>
  </div></div></div>`;
}

function renderSymptomsSection(job) {
  const s = job.symptoms;
  return `<div class="card"><div class="card-header"><div class="card-title"><div class="card-icon" style="background:#fef3c7;">🔧</div>อาการรถและรายละเอียดงาน</div><button class="btn btn-outline btn-sm" data-action="note">+ เพิ่มหมายเหตุ</button></div><div class="card-body">
    <div class="symptom-box"><div class="symptom-label">อาการที่ลูกค้าแจ้ง</div><div class="symptom-text">${App.esc(s.customer)}</div></div>
    <div class="symptom-box"><div class="symptom-label">ผลตรวจเช็กจากช่าง</div><div class="symptom-text">${App.esc(s.tech)}</div></div>
    <div class="symptom-box"><div class="symptom-label">หมายเหตุภายใน (ลูกค้าไม่เห็น)</div><div class="symptom-text" style="white-space:pre-line;">${App.esc(s.internal)}</div></div>
  </div></div>`;
}

function renderPartsSection(job) {
  // รองรับทั้ง local (parts array) และ GAS (services + parts แยกกัน)
  const services = job.services || [];
  const parts = job.parts || [];

  // ถ้ามี services (มาจาก GAS) ให้แสดง services ก่อน แล้วตามด้วย parts
  // ถ้าไม่มี services ให้แสดง parts อย่างเดียว (local mode)
  let allRows = '';

  if (services.length > 0) {
    allRows += services.map(s => `<tr>
      <td class="font-mono" style="font-size:10px;">${App.esc(s.code || '—')}</td>
      <td>${App.esc(s.name)}</td>
      <td>${App.esc(s.group || s.type || 'บริการ')}</td>
      <td class="text-right">1</td>
      <td class="text-right">${s.laborCost > 0 ? fmt.baht(s.laborCost) : '—'}</td>
      <td class="text-right">${fmt.baht(s.sellPrice - s.discount)}</td>
      <td class="text-right">${s.laborCost > 0 ? fmt.baht(s.laborCost) : '—'}</td>
      <td class="text-right">${fmt.baht(s.sellPrice)}</td>
      <td class="text-right ${(s.margin / Math.max(s.sellPrice,1) * 100) < 20 ? 'gp-negative' : 'gp-positive'}">${fmt.percent(s.sellPrice > 0 ? s.margin / s.sellPrice * 100 : 0)}</td>
      <td>—</td>
    </tr>`).join('');
  }

  if (parts.length > 0) {
    allRows += parts.map(p => {
      // GAS mode: lineSell/lineCost; local mode: sellUnit/costUnit * qty
      const sellTotal = p.lineSell > 0 ? p.lineSell : (p.sellUnit || 0) * (p.qty || 1);
      const costTotal = p.lineCost > 0 ? p.lineCost : (p.costUnit || 0) * (p.qty || 1);
      const gpPct = sellTotal > 0 ? (sellTotal - costTotal) / sellTotal * 100 : 0;
      return `<tr>
        <td class="font-mono" style="font-size:10px;">${App.esc(p.partNo)}</td>
        <td>${App.esc(p.name)}</td>
        <td>${partTypePill[p.type] || App.esc(p.type || 'อะไหล่')}</td>
        <td class="text-right">${fmt.number(p.qty || 1)}</td>
        <td class="text-right">${costTotal > 0 ? fmt.baht(p.costUnit || (p.lineCost / Math.max(p.qty,1))) : '—'}</td>
        <td class="text-right">${fmt.baht(p.sellUnit || (p.lineSell / Math.max(p.qty,1)))}</td>
        <td class="text-right">${costTotal > 0 ? fmt.baht(costTotal) : '—'}</td>
        <td class="text-right">${fmt.baht(sellTotal)}</td>
        <td class="text-right ${gpPct < 20 ? 'gp-negative' : 'gp-positive'}">${fmt.percent(gpPct)}</td>
        <td>${App.esc(p.supplier || '—')}</td>
      </tr>`;
    }).join('');
  }

  if (!allRows) {
    allRows = '<tr><td colspan="10" class="empty-state">ยังไม่มีรายการอะไหล่ / บริการ</td></tr>';
  }

  return `<div class="card table-wrap"><div class="card-header"><div class="card-title"><div class="card-icon" style="background:#d1fae5;">📦</div>รายการงานซ่อม / อะไหล่</div><button class="btn btn-primary btn-sm" data-action="part">+ เพิ่มรายการ</button></div><table class="parts-table"><thead><tr><th>รหัส</th><th>รายการ</th><th>ประเภท</th><th>จำนวน</th><th>ต้นทุน/หน่วย</th><th>ขาย/หน่วย</th><th>รวมต้นทุน</th><th>รวมขาย</th><th>GP%</th><th>Supplier</th></tr></thead><tbody>${allRows}</tbody></table></div>`;
}
}

function renderFinancialsAndHistory(job, fin) {
  const f = job.financials || {};
  // รองรับ GAS format (totalSell, partsTotal, laborMain, totalMargin, marginPct)
  // และ local format (grand, partsTotal, gp, gpPct)
  const isGasFormat = f.totalSell !== undefined;
  const displayTotal = isGasFormat ? f.totalSell : fin.grand;
  const displayParts = isGasFormat ? f.partsTotal : fin.partsTotal;
  const displayLabor = f.laborMain || 0;
  const displayMargin = isGasFormat ? f.totalMargin : fin.gp;
  const displayMarginPct = isGasFormat ? f.marginPct : fin.gpPct;

  const historyRows = (job.history || []).map(h => `<tr><td><a href="job-detail.html?id=${h.jobId}" class="job-no">${h.jobId}</a></td><td>${h.date}</td><td>${App.esc(h.work)}</td><td>${fmt.baht(h.amount)}</td><td>${jobStatusBadge[h.status] || h.status}</td></tr>`).join('');
  return `<div class="two-col-grid"><div class="card"><div class="card-header"><div class="card-title"><div class="card-icon" style="background:#ede9fe;">💳</div>สรุปค่าใช้จ่าย</div></div><div class="card-body"><div class="fin-section">
    <div class="fin-row"><span class="fin-key">ต้นทุนอะไหล่</span><span class="fin-val">${fmt.baht(displayParts)}</span></div>
    <div class="fin-row"><span class="fin-key">ค่าแรง</span><span class="fin-val">${fmt.baht(displayLabor)}</span></div>
    ${!isGasFormat ? `<div class="fin-row"><span class="fin-key">ค่าบริการพิเศษ</span><span class="fin-val">${fmt.baht(f.specialService)}</span></div>
    <div class="fin-row"><span class="fin-key">ส่วนลด</span><span class="fin-val positive">- ${fmt.baht(f.discount)}</span></div>
    <div class="fin-row"><span class="fin-key">VAT ${((f.vatRate || 0) * 100).toFixed(0)}%</span><span class="fin-val">${fmt.baht(fin.vat)}</span></div>` : ''}
    <div class="fin-row" style="border-top:1px solid #e8edf2;padding-top:8px;margin-top:4px;"><span class="fin-key" style="font-weight:600;color:var(--heading);">ยอดรวมสุทธิ</span><span class="fin-val total">${fmt.baht(displayTotal)}</span></div>
    ${!isGasFormat ? `<div class="fin-row"><span class="fin-key">รับชำระแล้ว</span><span class="fin-val positive">- ${fmt.baht(f.deposit)}</span></div>
    <div class="fin-row"><span class="fin-key remaining">คงเหลือต้องชำระ</span><span class="fin-val remaining">${fmt.baht(fin.remaining)}</span></div>` : ''}
    <div class="fin-row"><span class="fin-key">กำไร (Margin)</span><span class="fin-val ${displayMarginPct < 20 ? 'text-red' : 'positive'}">${fmt.baht(displayMargin)} (${fmt.percent(displayMarginPct)})</span></div>
  </div></div></div>
  <div class="card table-wrap"><div class="card-header"><div class="card-title"><div class="card-icon" style="background:#ccfbf1;">📋</div>ประวัติซ่อมย้อนหลัง (ทะเบียนเดียวกัน)</div></div><table class="history-table"><thead><tr><th>Job No</th><th>วันที่</th><th>งานที่ทำ</th><th>ยอด</th><th>สถานะ</th></tr></thead><tbody>${historyRows || '<tr><td colspan="5" class="empty-state">ยังไม่มีประวัติย้อนหลัง</td></tr>'}</tbody></table></div></div>`;
}

function renderRightRail(job, fin) {
  const timelineHtml = job.timeline.map((t, i) => `<div class="tl-item"><div class="tl-line"><div class="tl-dot ${t.status}"></div>${i < job.timeline.length - 1 ? `<div class="tl-connector ${t.status === 'done' ? 'done' : 'pending'}"></div>` : ''}</div><div class="tl-content"><div class="tl-step ${t.status}">${t.status === 'done' ? '✓ ' : t.status === 'active' ? '● ' : ''}${t.step}</div><div class="tl-time">${t.time}</div></div></div>`).join('');
  return `<div class="right-rail"><div class="card"><div class="card-header"><div class="card-title">📍 สถานะปัจจุบัน</div></div><div class="card-body"><div class="timeline">${timelineHtml}</div></div></div>
  <div class="card"><div class="card-header"><div class="card-title">👷 ผู้รับผิดชอบ</div></div><div class="card-body" style="padding:10px 16px;"><div class="rail-row"><span class="rail-key">ผู้เปิดจ๊อบ</span><span class="rail-val">${App.esc(job.assignee)}</span></div><div class="rail-row"><span class="rail-key">ช่างหลัก</span><span class="rail-val">${App.esc(job.technician)}</span></div><div class="rail-row"><span class="rail-key">นัดรับรถ</span><span class="rail-val text-red">${job.appointDate}</span></div><div class="rail-row"><span class="rail-key">ความเร่งด่วน</span><span class="rail-val">${renderUrgencyStars(job.urgency)}</span></div></div></div>
  <div class="card"><div class="card-header"><div class="card-title">⚡ Actions</div></div><div class="card-body"><div class="action-grid"><button class="action-btn primary" data-action="edit">แก้ไขข้อมูล</button><button class="action-btn warn" data-action="status">เปลี่ยนสถานะ</button><button class="action-btn" data-action="print">🖨 ใบรับรถ</button><button class="action-btn" data-action="print">🖨 ใบเสนอราคา</button><button class="action-btn" data-action="print">🖨 ใบเสร็จ</button><button class="action-btn" data-action="print">🖨 ใบส่งมอบ</button><button class="action-btn success" data-action="payment">💰 รับชำระ</button><button class="action-btn" data-action="part">+ อะไหล่</button><button class="action-btn" data-action="note">+ หมายเหตุ</button><button class="action-btn" data-action="photo">📷 อัปโหลดรูป</button></div></div></div></div>`;
}

function wireDetailActions() {
  App.qsa('[data-action]').forEach(btn => btn.addEventListener('click', () => {
    const a = btn.dataset.action;
    if (a === 'edit') openEditModal();
    if (a === 'status') openStatusModal();
    if (a === 'payment') openPaymentModal();
    if (a === 'part') openPartModal();
    if (a === 'note') openNoteModal();
    if (a === 'print') printPage(`เอกสาร ${CURRENT_JOB.id}`);
    if (a === 'photo') toast('MVP นี้เตรียมปุ่มอัปโหลดรูปไว้แล้ว ขั้นต่อไปเชื่อม Google Drive/Apps Script', 'info');
  }));
}

function openEditModal() {
  const j = CURRENT_JOB;
  openModal('แก้ไขข้อมูลงาน', `<form id="edit-form" class="form-grid">
    <label class="form-field"><span>สถานะ</span><select name="jobStatus"><option>${j.jobStatus}</option><option>รับรถเข้า</option><option>ตรวจเช็ก</option><option>เสนอราคา</option><option>รออะไหล่</option><option>กำลังซ่อม</option><option>ตรวจซ้ำ</option><option>พร้อมส่งมอบ</option><option>ส่งมอบแล้ว</option></select></label>
    <label class="form-field"><span>นัดรับรถ</span><input type="date" name="appointDate" value="${j.appointDateISO || ''}" /></label>
    <label class="form-field"><span>ผู้รับผิดชอบ</span><select name="assignee"><option>${j.assignee}</option><option>เอ</option><option>สุทธินนท์</option><option>ภควัต</option><option>อภิสิทธิ์</option></select></label>
    <label class="form-field"><span>ยอดประเมิน</span><input type="number" name="estimated" value="${j.estimated || 0}" /></label>
    <label class="form-field"><span>ค่าแรงหลัก</span><input type="number" name="laborMain" value="${j.financials.laborMain || 0}" /></label>
    <label class="form-field"><span>ส่วนลด</span><input type="number" name="discount" value="${j.financials.discount || 0}" /></label>
    <label class="form-field full"><span>อาการลูกค้าแจ้ง</span><textarea name="symptom" rows="3">${App.esc(j.symptoms.customer)}</textarea></label>
    <label class="form-field full"><span>ผลตรวจเช็ก</span><textarea name="techNote" rows="3">${App.esc(j.symptoms.tech)}</textarea></label>
  </form>`, `<button class="btn btn-outline" data-close-modal>ยกเลิก</button><button class="btn btn-primary" id="save-edit">บันทึก</button>`);
  document.getElementById('save-edit').onclick = async () => {
    const f = document.getElementById('edit-form');
    MockData.updateJob(j.id, { jobStatus: formValue(f,'jobStatus'), appointDate: formValue(f,'appointDate'), assignee: formValue(f,'assignee'), technician: formValue(f,'assignee'), estimated: formNumber(f,'estimated'), symptom: formValue(f,'symptom'), techNote: formValue(f,'techNote'), financials: { laborMain: formNumber(f,'laborMain'), discount: formNumber(f,'discount') } });
    toast('บันทึกข้อมูลแล้ว', 'success'); closeModal(); await renderPage();
  };
}

function openStatusModal() {
  const opts = ['รับรถเข้า','ตรวจเช็ก','เสนอราคา','รออะไหล่','รอชิ้นส่วน','กำลังซ่อม','ตรวจซ้ำ','เสร็จแล้ว','พร้อมส่งมอบ','ส่งมอบแล้ว','ยกเลิก'];
  openModal('เปลี่ยนสถานะ', `<label class="form-field"><span>สถานะใหม่</span><select id="new-status">${opts.map(o => `<option ${o === CURRENT_JOB.jobStatus ? 'selected' : ''}>${o}</option>`).join('')}</select></label>`, `<button class="btn btn-outline" data-close-modal>ยกเลิก</button><button class="btn btn-primary" id="save-status">บันทึก</button>`);
  document.getElementById('save-status').onclick = async () => { MockData.updateJobStatus(CURRENT_JOB.id, document.getElementById('new-status').value); toast('เปลี่ยนสถานะแล้ว', 'success'); closeModal(); await renderPage(); };
}

async function openPaymentModal() {
  const settings = await MockData.getSettings();
  const fin = CURRENT_JOB.financials && CURRENT_JOB.financials.totalSell !== undefined
    ? { remaining: 0, grand: CURRENT_JOB.financials.totalSell }
    : calcFinancials(CURRENT_JOB.financials, CURRENT_JOB.parts);
  openModal('บันทึกรับชำระ', `<form id="pay-form" class="form-grid"><label class="form-field"><span>ยอดรับชำระ</span><input name="amount" type="number" value="${fin.remaining}" /></label><label class="form-field"><span>เข้าบัญชี</span><select name="accountId">${settings.bankAccounts.map(a => `<option value="${a.id}">${a.name}</option>`).join('')}</select></label><label class="form-field"><span>ช่องทาง</span><select name="channel">${selectOptions(masterList(settings, 'channels'), 'โอน/QR')}</select></label></form>`, `<button class="btn btn-outline" data-close-modal>ยกเลิก</button><button class="btn btn-primary" id="save-payment">บันทึก</button>`);
  document.getElementById('save-payment').onclick = async () => { const f = document.getElementById('pay-form'); MockData.savePayment(CURRENT_JOB.id, formNumber(f,'amount'), formValue(f,'accountId'), formValue(f,'channel')); toast('บันทึกรับชำระแล้ว', 'success'); closeModal(); await renderPage(); };
}

async function openPartModal() {
  const parts = await MockData.getParts();
  const typeOptions=selectOptions(masterList(settings,'partTypes'),'แท้');const supplierOptions=datalistOptions(masterList(settings,'suppliers'));openModal('เพิ่มอะไหล่ / ค่าแรง', `<form id="part-form" class="form-grid"><label class="form-field full"><span>เลือกจากคลัง</span><select name="partId" id="part-select"><option value="">-- เพิ่มเอง --</option>${parts.map(p => `<option value="${p.id}" data-cost="${p.costUnit}" data-sell="${p.sellUnit}">${p.partNo} · ${p.name} · คงเหลือ ${p.stockQty}</option>`).join('')}</select></label><label class="form-field"><span>Part No</span><input name="partNo" /></label><label class="form-field"><span>ชื่อรายการ</span><input name="name" /></label><label class="form-field"><span>ประเภท</span><select name="type">${typeOptions}</select></label><label class="form-field"><span>จำนวน</span><input name="qty" type="number" value="1" min="1" /></label><label class="form-field"><span>ต้นทุน/หน่วย</span><input name="costUnit" type="number" value="0" /></label><label class="form-field"><span>ขาย/หน่วย</span><input name="sellUnit" type="number" value="0" /></label><label class="form-field"><span>Supplier</span><input name="supplier" list="supplier-list" /><datalist id="supplier-list">${supplierOptions}</datalist></label></form>`, `<button class="btn btn-outline" data-close-modal>ยกเลิก</button><button class="btn btn-primary" id="save-part">เพิ่มรายการ</button>`);
  document.getElementById('part-select').onchange = (ev) => { const p = parts.find(x => x.id === ev.target.value); const f = document.getElementById('part-form'); if (p) { f.elements.partNo.value = p.partNo; f.elements.name.value = p.name; f.elements.type.value = p.type; f.elements.costUnit.value = p.costUnit; f.elements.sellUnit.value = p.sellUnit; f.elements.supplier.value = p.supplier; } };
  document.getElementById('save-part').onclick = async () => { const f = document.getElementById('part-form'); MockData.addJobPart(CURRENT_JOB.id, { partId: formValue(f,'partId'), partNo: formValue(f,'partNo'), name: formValue(f,'name'), type: formValue(f,'type'), qty: formNumber(f,'qty',1), costUnit: formNumber(f,'costUnit'), sellUnit: formNumber(f,'sellUnit'), supplier: formValue(f,'supplier') }); toast('เพิ่มรายการแล้ว', 'success'); closeModal(); await renderPage(); };
}

function openNoteModal() {
  openModal('เพิ่มหมายเหตุ', `<label class="form-field full"><span>หมายเหตุ</span><textarea id="note-text" rows="4" placeholder="บันทึกสิ่งที่ต้องติดตาม..."></textarea></label>`, `<button class="btn btn-outline" data-close-modal>ยกเลิก</button><button class="btn btn-primary" id="save-note">บันทึก</button>`);
  document.getElementById('save-note').onclick = async () => { const note = document.getElementById('note-text').value.trim(); if (!note) return toast('กรุณาใส่หมายเหตุ', 'warning'); MockData.addNote(CURRENT_JOB.id, note); toast('เพิ่มหมายเหตุแล้ว', 'success'); closeModal(); await renderPage(); };
}
</script>
