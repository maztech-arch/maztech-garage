<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>รายงาน / Export — Maztech Garage</title><link rel="stylesheet" href="styles.css"><script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script><script src="mock-data.js"></script><script src="app.js"></script></head><body><div class="app-shell" id="app"></div><script>
(async()=>{chartDefaults();const r=await MockData.getReports();document.getElementById('app').innerHTML=`${renderSidebar('reports')}<div class="main-area">${renderTopbar([{label:'Maztech Garage',href:'dashboard.html'},{label:'รายงาน / Export'}])}<main class="page-content"><div class="page-header"><div><div class="page-title">รายงาน / Export</div><div class="page-sub">สรุปภาพรวมสำหรับเจ้าของอู่ และส่งออกข้อมูลหลักไปทำรายงานต่อ</div></div><div class="header-actions"><button class="btn btn-outline" id="export-jobs">Export Jobs</button><button class="btn btn-outline" id="export-parts">Export Parts</button><button class="btn btn-primary" onclick="printPage('รายงาน Maztech Garage')">พิมพ์รายงาน</button></div></div><div class="kpi-grid"><div class="kpi-card"><div class="kpi-icon">💰</div><div class="kpi-label">เงินคงเหลือรวม</div><div class="kpi-value">${fmt.baht(r.dashboard.cashBalance)}</div><div class="kpi-change neutral">รวมทุกบัญชี</div></div><div class="kpi-card"><div class="kpi-icon">📈</div><div class="kpi-label">รายรับเดือนนี้</div><div class="kpi-value">${fmt.baht(r.dashboard.revenueMonth)}</div><div class="kpi-change up">จาก Daily_Cashflow</div></div><div class="kpi-card"><div class="kpi-icon">📉</div><div class="kpi-label">รายจ่ายเดือนนี้</div><div class="kpi-value">${fmt.baht(r.dashboard.expenseMonth)}</div><div class="kpi-change down">จาก Daily_Cashflow</div></div><div class="kpi-card"><div class="kpi-icon">🔧</div><div class="kpi-label">จำนวนงานทั้งหมด</div><div class="kpi-value sm">${fmt.number(r.jobs.length)} งาน</div><div class="kpi-change neutral">Job_Header</div></div></div><div class="charts-row"><div class="card"><div class="card-header"><div><div class="card-title">รายรับ vs รายจ่ายย้อนหลัง 6 เดือน</div><div class="card-sub">คำนวณจาก localStorage</div></div></div><div class="card-body"><canvas id="revChart" height="140"></canvas></div></div><div class="card"><div class="card-header"><div><div class="card-title">ยอดคงเหลือแต่ละบัญชี</div><div class="card-sub">KBank-รับ / KBank-จ่าย / เงินสด</div></div></div><div class="card-body">${r.accounts.map(a=>`<div class="fin-row"><span class="fin-key">${a.name}</span><span class="fin-val total">${fmt.baht(a.balance)}</span></div>`).join('')}</div></div></div><div class="card table-wrap"><div class="card-header"><div class="card-title">Top งานซ่อมตามยอดเงินจริง</div></div><table class="data-table"><thead><tr><th>Job_ID</th><th>ทะเบียน</th><th>ลูกค้า</th><th>สถานะ</th><th>ยอดจริง</th><th>ค้างชำระ</th></tr></thead><tbody>${r.jobs.slice().sort((a,b)=>b.actual-a.actual).slice(0,10).map(j=>`<tr><td><a class="job-no" href="job-detail.html?id=${j.id}">${j.id}</a></td><td><span class="plate-tag">${j.plate}</span></td><td>${j.customer}</td><td>${jobStatusBadge[j.jobStatus]||j.jobStatus}</td><td class="text-right">${fmt.baht(j.actual)}</td><td class="text-right text-red">${fmt.baht(j.remaining)}</td></tr>`).join('')}</tbody></table></div></main></div>`;wireGlobalSearch();document.getElementById('export-jobs').onclick=()=>downloadCSV('maztech-report-jobs.csv',r.jobs);document.getElementById('export-parts').onclick=()=>downloadCSV('maztech-report-parts.csv',r.parts);new Chart(document.getElementById('revChart'),{type:'bar',data:{labels:r.monthlyRevenue.map(x=>x.month),datasets:[{label:'รายรับ',data:r.monthlyRevenue.map(x=>x.revenue),backgroundColor:'rgba(30,111,196,0.78)',borderRadius:4},{label:'รายจ่าย',data:r.monthlyRevenue.map(x=>x.expense),backgroundColor:'rgba(245,158,11,0.65)',borderRadius:4}]},options:{responsive:true,plugins:{legend:{labels:{boxWidth:10}}},scales:{y:{ticks:{callback:v=>'฿'+(v/1000).toFixed(0)+'K'}}}}});})();
</script></body></html>
