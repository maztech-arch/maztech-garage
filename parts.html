<!DOCTYPE html>
<html lang="th">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>อะไหล่ / คลัง — Maztech Garage</title><link rel="stylesheet" href="styles.css" /><script src="mock-data.js"></script><script src="app.js"></script></head>
<body><div class="app-shell" id="app"></div>
<script>
let PARTS=[], SETTINGS={};
(async()=>{[PARTS,SETTINGS]=await Promise.all([MockData.getParts(),MockData.getSettings()]);render();})();
function render(){const low=PARTS.filter(p=>Number(p.stockQty)<=Number(p.minStock));const value=PARTS.reduce((s,p)=>s+Number(p.stockQty||0)*Number(p.costUnit||0),0);document.getElementById('app').innerHTML=`${renderSidebar('parts')}<div class="main-area">${renderTopbar([{label:'Maztech Garage',href:'dashboard.html'},{label:'อะไหล่ / คลัง'}])}<main class="page-content"><div class="page-header"><div><div class="page-title">อะไหล่ / คลัง</div><div class="page-sub">จัดการ Parts_Master แบบ localStorage ก่อน ต่อไปใช้เป็นฐานเชื่อม Google Sheets</div></div><div class="header-actions"><button class="btn btn-primary" id="add-part">+ เพิ่มอะไหล่</button><button class="btn btn-outline" id="export-parts">Export CSV</button></div></div><div class="summary-strip"><div class="summary-card" style="--sc-color:#1e6fc4"><div class="summary-val">${fmt.number(PARTS.length)}</div><div class="summary-label">รายการอะไหล่</div></div><div class="summary-card" style="--sc-color:#f59e0b"><div class="summary-val">${fmt.number(low.length)}</div><div class="summary-label">สต็อกต่ำ</div></div><div class="summary-card" style="--sc-color:#059669"><div class="summary-val">${fmt.baht(value)}</div><div class="summary-label">มูลค่าต้นทุนคงคลัง</div></div></div><div class="card"><div class="filter-panel"><div class="filter-row"><div class="filter-group"><label class="filter-label">ค้นหาอะไหล่</label><input class="filter-input" id="q" placeholder="Part No / ชื่อ / Supplier" /></div><div class="filter-group"><label class="filter-label">ประเภท</label><select class="filter-select" id="type"><option value="">ทุกประเภท</option>${masterList(SETTINGS,'partTypes').map(t=>`<option>${App.esc(t)}</option>`).join('')}</select></div><div class="filter-group"><label class="filter-label">&nbsp;</label><button class="btn btn-outline btn-sm" id="show-low">แสดงสต็อกต่ำ</button></div></div></div></div><div id="parts-slot">${table(PARTS)}</div></main></div>`;wireGlobalSearch();wire();}
function table(rows){return`<div class="card table-wrap"><table class="data-table"><thead><tr><th>Part No</th><th>รายการ</th><th>ประเภท</th><th>คงเหลือ</th><th>ขั้นต่ำ</th><th>ต้นทุน</th><th>ราคาขาย</th><th>GP%</th><th>Supplier</th><th>จัดการ</th></tr></thead><tbody>${rows.map(p=>{const gp=calcGP(p.costUnit,p.sellUnit,1);return`<tr><td class="mono">${App.esc(p.partNo)}</td><td>${App.esc(p.name)}</td><td>${partTypePill[p.type]||p.type}</td><td class="text-right ${Number(p.stockQty)<=Number(p.minStock)?'text-red':''}">${fmt.number(p.stockQty)}</td><td class="text-right">${fmt.number(p.minStock)}</td><td class="text-right">${fmt.baht(p.costUnit)}</td><td class="text-right">${fmt.baht(p.sellUnit)}</td><td class="text-right ${gp.gpPct<20?'gp-negative':'gp-positive'}">${fmt.percent(gp.gpPct)}</td><td>${App.esc(p.supplier)}</td><td><button class="btn btn-outline btn-xs" data-edit="${p.id}">แก้</button><button class="btn btn-warn btn-xs" data-stock="${p.id}">สต็อก</button></td></tr>`}).join('')||'<tr><td colspan="10" class="empty-state">ไม่พบข้อมูลอะไหล่</td></tr>'}</tbody></table></div>`}
function wire(){document.getElementById('add-part').onclick=()=>openPart();document.getElementById('export-parts').onclick=()=>downloadCSV('maztech-parts.csv',PARTS);document.getElementById('q').oninput=App.debounce(filter,120);document.getElementById('type').onchange=filter;document.getElementById('show-low').onclick=()=>{document.getElementById('parts-slot').innerHTML=table(PARTS.filter(p=>Number(p.stockQty)<=Number(p.minStock)));wireTable();};wireTable();}
function wireTable(){App.qsa('[data-edit]').forEach(b=>b.onclick=()=>openPart(PARTS.find(p=>p.id===b.dataset.edit)));App.qsa('[data-stock]').forEach(b=>b.onclick=()=>openStock(PARTS.find(p=>p.id===b.dataset.stock)));}
function filter(){const q=App.text(document.getElementById('q').value).toLowerCase();const t=document.getElementById('type').value;const rows=PARTS.filter(p=>(!t||p.type===t)&&(`${p.partNo} ${p.name} ${p.supplier}`.toLowerCase().includes(q)));document.getElementById('parts-slot').innerHTML=table(rows);wireTable();}
function openPart(p={}){const typeOptions=selectOptions(masterList(SETTINGS,'partTypes'),p.type||'แท้');const supplierOptions=datalistOptions(masterList(SETTINGS,'suppliers'));openModal(p.id?'แก้ไขอะไหล่':'เพิ่มอะไหล่',`<form id="part-form" class="form-grid"><input type="hidden" name="id" value="${p.id||''}"><label class="form-field"><span>Part No</span><input name="partNo" value="${App.esc(p.partNo||'')}"></label><label class="form-field"><span>ชื่อรายการ *</span><input name="name" required value="${App.esc(p.name||'')}"></label><label class="form-field"><span>ประเภท</span><select name="type">${typeOptions}</select></label><label class="form-field"><span>หน่วย</span><input name="unit" value="${App.esc(p.unit||'ชิ้น')}"></label><label class="form-field"><span>ต้นทุน/หน่วย</span><input type="number" name="costUnit" value="${p.costUnit||0}"></label><label class="form-field"><span>ราคาขาย/หน่วย</span><input type="number" name="sellUnit" value="${p.sellUnit||0}"></label><label class="form-field"><span>คงเหลือ</span><input type="number" name="stockQty" value="${p.stockQty||0}"></label><label class="form-field"><span>ขั้นต่ำ</span><input type="number" name="minStock" value="${p.minStock||0}"></label><label class="form-field full"><span>Supplier</span><input name="supplier" list="supplier-list" value="${App.esc(p.supplier||'')}"><datalist id="supplier-list">${supplierOptions}</datalist></label></form>`,`<button class="btn btn-outline" data-close-modal>ยกเลิก</button><button class="btn btn-primary" id="save-part">บันทึก</button>`);document.getElementById('save-part').onclick=async()=>{const f=document.getElementById('part-form');if(!f.reportValidity())return;MockData.savePart({id:formValue(f,'id'),partNo:formValue(f,'partNo'),name:formValue(f,'name'),type:formValue(f,'type'),unit:formValue(f,'unit'),costUnit:formNumber(f,'costUnit'),sellUnit:formNumber(f,'sellUnit'),stockQty:formNumber(f,'stockQty'),minStock:formNumber(f,'minStock'),supplier:formValue(f,'supplier')});toast('บันทึกอะไหล่แล้ว','success');closeModal();PARTS=await MockData.getParts();SETTINGS=await MockData.getSettings();render();};}
function openStock(p){openModal('ปรับสต็อก',`<div class="form-grid"><div class="info-item full"><span class="info-label">${App.esc(p.name)}</span><span class="info-val">คงเหลือปัจจุบัน ${fmt.number(p.stockQty)} ${p.unit}</span></div><label class="form-field"><span>เพิ่ม/ลดจำนวน</span><input id="stock-change" type="number" placeholder="เช่น 5 หรือ -2"></label><label class="form-field"><span>หมายเหตุ</span><input id="stock-note" placeholder="ซื้อเข้า / ตัดใช้ / ตรวจนับ"></label></div>`,`<button class="btn btn-outline" data-close-modal>ยกเลิก</button><button class="btn btn-primary" id="save-stock">บันทึก</button>`);document.getElementById('save-stock').onclick=async()=>{MockData.adjustStock(p.id,App.num(document.getElementById('stock-change').value),document.getElementById('stock-note').value);toast('ปรับสต็อกแล้ว','success');closeModal();PARTS=await MockData.getParts();render();};}
</script></body></html>
