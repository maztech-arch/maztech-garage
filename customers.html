<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>ลูกค้า / รถ — Maztech Garage</title><link rel="stylesheet" href="styles.css"><script src="mock-data.js"></script><script src="app.js"></script></head><body><div class="app-shell" id="app"></div><script>
let CUSTOMERS=[];
(async()=>{CUSTOMERS=await MockData.getCustomers();render();})();
function render(){document.getElementById('app').innerHTML=`${renderSidebar('customers')}<div class="main-area">${renderTopbar([{label:'Maztech Garage',href:'dashboard.html'},{label:'ลูกค้า / รถ'}])}<main class="page-content"><div class="page-header"><div><div class="page-title">ลูกค้า / รถ</div><div class="page-sub">ฐานข้อมูล Customer_Master + Vehicle_Master ดูประวัติซ่อมย้อนหลังได้จากทะเบียน/ลูกค้า</div></div><div class="header-actions"><button class="btn btn-primary" id="add-customer">+ เพิ่มลูกค้า/รถ</button><button class="btn btn-outline" id="export-customers">Export CSV</button></div></div><div class="summary-strip"><div class="summary-card" style="--sc-color:#1e6fc4"><div class="summary-val">${fmt.number(CUSTOMERS.length)}</div><div class="summary-label">ลูกค้าทั้งหมด</div></div><div class="summary-card" style="--sc-color:#059669"><div class="summary-val">${fmt.number(CUSTOMERS.reduce((s,c)=>s+c.vehicles.length,0))}</div><div class="summary-label">รถในระบบ</div></div><div class="summary-card" style="--sc-color:#f59e0b"><div class="summary-val">${fmt.number(CUSTOMERS.reduce((s,c)=>s+c.jobs.length,0))}</div><div class="summary-label">ประวัติงานซ่อม</div></div></div><div class="card"><div class="filter-panel"><div class="filter-row"><div class="filter-group"><label class="filter-label">ค้นหา</label><input class="filter-input" id="q" placeholder="ชื่อ / เบอร์ / ทะเบียน / รุ่นรถ"></div></div></div></div><div id="slot">${table(CUSTOMERS)}</div></main></div>`;wireGlobalSearch();wire();}
function table(rows){return`<div class="card table-wrap"><table class="data-table"><thead><tr><th>ลูกค้า</th><th>เบอร์</th><th>LINE</th><th>ประเภท</th><th>รถ / ทะเบียน</th><th>จำนวนจ๊อบ</th><th>ยอดใช้บริการ</th><th>จัดการ</th></tr></thead><tbody>${rows.map(c=>{const total=c.jobs.reduce((s,j)=>s+Number(j.estimated||0),0);return`<tr><td>${App.esc(c.name)}</td><td class="mono">${App.esc(c.phone)}</td><td>${App.esc(c.line)}</td><td><span class="badge badge-purple">${App.esc(c.type)}</span></td><td>${c.vehicles.map(v=>`<div><span class="plate-tag">${App.esc(v.plate)}</span> ${App.esc(v.model)}</div>`).join('')||'—'}</td><td class="text-right">${fmt.number(c.jobs.length)}</td><td class="text-right">${fmt.baht(total)}</td><td><button class="btn btn-outline btn-xs" data-edit="${c.id}">แก้</button>${c.jobs[0]?`<a class="btn btn-outline btn-xs" href="job-detail.html?id=${c.jobs[0].id}">ประวัติ</a>`:''}</td></tr>`}).join('')||'<tr><td colspan="8" class="empty-state">ไม่พบข้อมูลลูกค้า</td></tr>'}</tbody></table></div>`}
function wire(){document.getElementById('add-customer').onclick=()=>openCustomer();document.getElementById('export-customers').onclick=()=>downloadCSV('maztech-customers.csv',CUSTOMERS.map(c=>({id:c.id,name:c.name,phone:c.phone,line:c.line,type:c.type,vehicles:c.vehicles.map(v=>v.plate).join('|'),jobs:c.jobs.length})));document.getElementById('q').oninput=App.debounce(()=>{const q=App.text(document.getElementById('q').value).toLowerCase();const rows=CUSTOMERS.filter(c=>`${c.name} ${c.phone} ${c.line} ${c.vehicles.map(v=>v.plate+' '+v.model).join(' ')}`.toLowerCase().includes(q));document.getElementById('slot').innerHTML=table(rows);wireTable();},120);wireTable();}
function wireTable(){App.qsa('[data-edit]').forEach(b=>b.onclick=()=>openCustomer(CUSTOMERS.find(c=>c.id===b.dataset.edit)));}
function openCustomer(c={vehicles:[{}]}){const v=(c.vehicles&&c.vehicles[0])||{};openModal(c.id?'แก้ไขลูกค้า/รถ':'เพิ่มลูกค้า/รถ',`<form id="cust-form" class="form-grid"><input type="hidden" name="id" value="${c.id||''}"><label class="form-field"><span>ชื่อลูกค้า *</span><input name="name" required value="${App.esc(c.name||'')}"></label><label class="form-field"><span>เบอร์โทร</span><input name="phone" value="${App.esc(c.phone||'')}"></label><label class="form-field"><span>LINE</span><input name="line" value="${App.esc(c.line||'')}"></label><label class="form-field"><span>ประเภท</span><select name="type"><option ${c.type==='ลูกค้าทั่วไป'?'selected':''}>ลูกค้าทั่วไป</option><option ${c.type==='ลูกค้าประจำ'?'selected':''}>ลูกค้าประจำ</option><option ${c.type==='ลูกค้า VIP'?'selected':''}>ลูกค้า VIP</option><option ${c.type==='ลูกค้าฟลีท'?'selected':''}>ลูกค้าฟลีท</option></select></label><label class="form-field"><span>ทะเบียน</span><input name="plate" value="${App.esc(v.plate||'')}"></label><label class="form-field"><span>รุ่นรถ</span><input name="model" value="${App.esc(v.model||'')}"></label><label class="form-field"><span>เลขไมล์</span><input type="number" name="mileage" value="${v.mileage||0}"></label><label class="form-field"><span>สีรถ</span><input name="color" value="${App.esc(v.color||'')}"></label><label class="form-field full"><span>VIN</span><input name="vin" value="${App.esc(v.vin||'')}"></label></form>`,`<button class="btn btn-outline" data-close-modal>ยกเลิก</button><button class="btn btn-primary" id="save-customer">บันทึก</button>`);document.getElementById('save-customer').onclick=async()=>{const f=document.getElementById('cust-form');if(!f.reportValidity())return;MockData.saveCustomer({id:formValue(f,'id'),name:formValue(f,'name'),phone:formValue(f,'phone'),line:formValue(f,'line'),type:formValue(f,'type'),plate:formValue(f,'plate'),model:formValue(f,'model'),mileage:formNumber(f,'mileage'),color:formValue(f,'color'),vin:formValue(f,'vin')});toast('บันทึกลูกค้าแล้ว','success');closeModal();CUSTOMERS=await MockData.getCustomers();render();};}
</script></body></html>
