<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>ตั้งค่าระบบ — Maztech Garage</title><link rel="stylesheet" href="styles.css"><script src="mock-data.js"></script><script src="app.js"></script></head><body><div class="app-shell" id="app"></div><script>
let SETTINGS = {};
(async()=>{SETTINGS=await MockData.getSettings();render();})();
function listToText(list){return (Array.isArray(list)?list:[]).join('\n');}
function textToList(text){return String(text||'').split('\n').map(x=>x.trim()).filter(Boolean);}
function render(){const m=SETTINGS.dropdownMasters||{};document.getElementById('app').innerHTML=`${renderSidebar('settings')}<div class="main-area">${renderTopbar([{label:'Maztech Garage',href:'dashboard.html'},{label:'ตั้งค่าระบบ'}])}<main class="page-content"><div class="page-header"><div><div class="page-title">ตั้งค่าระบบ</div><div class="page-sub">ตั้งค่าชื่ออู่ บัญชีธนาคาร หุ้นส่วน ค่าใช้จ่ายคงที่ และ Dropdown Master</div></div><div class="header-actions"><button class="btn btn-outline" id="backup">ดาวน์โหลด Backup</button><button class="btn btn-warn" id="reset-demo">รีเซ็ตข้อมูล Demo</button></div></div>
<form class="card form-card" id="settings-form"><div class="card-header"><div class="card-title"><div class="card-icon" style="background:#dbeafe">⚙️</div>ข้อมูลอู่</div></div><div class="card-body"><div class="form-grid"><label class="form-field"><span>ชื่ออู่</span><input name="shopName" value="${App.esc(SETTINGS.shopName)}"></label><label class="form-field"><span>ชื่อผู้ใช้หลัก</span><input name="ownerName" value="${App.esc(SETTINGS.ownerName)}"></label><label class="form-field"><span>เบอร์โทร</span><input name="phone" value="${App.esc(SETTINGS.phone)}"></label><label class="form-field"><span>VAT Rate</span><input type="number" step="0.01" name="vatRate" value="${SETTINGS.vatRate}"></label><label class="form-field"><span>เป้า GP%</span><input type="number" name="gpTarget" value="${SETTINGS.gpTarget}"></label><label class="form-field"><span>กันสำรองก่อนปันผล %</span><input type="number" name="reservePercent" value="${SETTINGS.reservePercent}"></label><label class="form-field full"><span>ที่อยู่</span><input name="address" value="${App.esc(SETTINGS.address)}"></label><label class="form-field full"><span>Google Apps Script Web App URL (/exec)</span><input name="gasUrl" value="${App.esc(SETTINGS.gasUrl||'')}" placeholder="ใส่ภายหลังเมื่อพร้อมเชื่อม Google Sheets"></label></div></div></form>
<div class="card form-card"><div class="card-header"><div class="card-title"><div class="card-icon" style="background:#d1fae5">🏦</div>บัญชีธนาคาร / ยอดยกมา</div></div><div class="card-body"><div class="form-grid" id="accounts-grid">${SETTINGS.bankAccounts.map((a,i)=>`<label class="form-field"><span>ชื่อบัญชี ${i+1}</span><input data-acc-name="${i}" value="${App.esc(a.name)}"></label><label class="form-field"><span>รหัสบัญชี ${i+1}</span><input data-acc-id="${i}" value="${App.esc(a.id)}"></label><label class="form-field"><span>ยอดยกมา ${i+1}</span><input type="number" data-acc-bal="${i}" value="${a.openingBalance}"></label>`).join('')}</div></div></div>
<div class="card form-card"><div class="card-header"><div class="card-title"><div class="card-icon" style="background:#ede9fe">🤝</div>หุ้นส่วน / สัดส่วนแบ่งกำไร</div></div><div class="card-body"><div class="form-grid">${(SETTINGS.partners||[]).map((p,i)=>`<label class="form-field"><span>ชื่อหุ้นส่วน ${i+1}</span><input data-partner-name="${i}" value="${App.esc(p.name)}"></label><label class="form-field"><span>สัดส่วน % ${i+1}</span><input type="number" data-partner-share="${i}" value="${p.sharePercent}"></label>`).join('')}</div><div class="muted-xs" style="margin-top:8px">ระบบจะนำกำไรหลังกันสำรอง ${SETTINGS.reservePercent||0}% มาแบ่งตามสัดส่วนนี้</div></div></div>
<div class="card form-card"><div class="card-header"><div class="card-title"><div class="card-icon" style="background:#fef3c7">🏥</div>ค่าใช้จ่ายคงที่ต่อเดือน</div></div><div class="card-body"><div class="form-grid">${(SETTINGS.fixedExpenses||[]).map((x,i)=>`<label class="form-field"><span>รายการ ${i+1}</span><input data-fixed-name="${i}" value="${App.esc(x.name)}"></label><label class="form-field"><span>จำนวนเงิน ${i+1}</span><input type="number" data-fixed-amount="${i}" value="${x.amount}"></label>`).join('')}</div><div class="muted-xs" style="margin-top:8px">ใช้คำนวณสุขภาพการเงิน เช่น เงินสดพอใช้ได้กี่วัน</div></div></div>
<div class="card form-card"><div class="card-header"><div class="card-title"><div class="card-icon" style="background:#e0f2fe">🔽</div>Dropdown Master</div></div><div class="card-body"><div class="form-grid"><label class="form-field full"><span>รุ่นรถ Mazda — 1 รายการต่อ 1 บรรทัด</span><textarea rows="9" data-master="vehicleModels">${App.esc(listToText(m.vehicleModels))}</textarea></label><label class="form-field full"><span>ซัพพลายเออร์ — 1 รายการต่อ 1 บรรทัด</span><textarea rows="6" data-master="suppliers">${App.esc(listToText(m.suppliers))}</textarea></label><label class="form-field full"><span>สถานะงานซ่อม</span><textarea rows="4" data-master="jobStatuses">${App.esc(listToText(m.jobStatuses))}</textarea></label><label class="form-field full"><span>หมวดรายรับ</span><textarea rows="4" data-master="incomeCategories">${App.esc(listToText(m.incomeCategories))}</textarea></label><label class="form-field full"><span>หมวดรายจ่าย</span><textarea rows="4" data-master="expenseCategories">${App.esc(listToText(m.expenseCategories))}</textarea></label><label class="form-field full"><span>ช่องทางรับ/จ่ายเงิน</span><textarea rows="3" data-master="channels">${App.esc(listToText(m.channels))}</textarea></label><label class="form-field full"><span>ประเภทอะไหล่</span><textarea rows="3" data-master="partTypes">${App.esc(listToText(m.partTypes))}</textarea></label></div><div class="muted-xs" style="margin-top:8px">รายการเหล่านี้จะถูกนำไปใช้ในหน้าเปิดจ๊อบ ลูกค้า/รถ อะไหล่ และรายรับ-รายจ่าย เพื่อลดการพิมพ์ผิด</div></div></div>
<div class="sticky-actions"><a class="btn btn-outline" href="dashboard.html">กลับ Dashboard</a><button class="btn btn-primary" id="save-settings">บันทึกตั้งค่า</button></div></main></div>`;wireGlobalSearch();wire();}
function wire(){document.getElementById('save-settings').onclick=async()=>{const f=document.getElementById('settings-form');const bankAccounts=SETTINGS.bankAccounts.map((a,i)=>({id:document.querySelector(`[data-acc-id="${i}"]`).value.trim()||a.id,name:document.querySelector(`[data-acc-name="${i}"]`).value.trim()||a.name,openingBalance:App.num(document.querySelector(`[data-acc-bal="${i}"]`).value)}));const partners=(SETTINGS.partners||[]).map((p,i)=>({id:p.id||`P${String(i+1).padStart(3,'0')}`,name:document.querySelector(`[data-partner-name="${i}"]`).value.trim()||p.name,sharePercent:App.num(document.querySelector(`[data-partner-share="${i}"]`).value),status:p.status||'Active'}));const fixedExpenses=(SETTINGS.fixedExpenses||[]).map((x,i)=>({id:x.id||`FIX${i+1}`,name:document.querySelector(`[data-fixed-name="${i}"]`).value.trim()||x.name,amount:App.num(document.querySelector(`[data-fixed-amount="${i}"]`).value)}));const dropdownMasters={...(SETTINGS.dropdownMasters||{})};App.qsa('[data-master]').forEach(el=>{dropdownMasters[el.dataset.master]=textToList(el.value);});MockData.saveSettings({shopName:formValue(f,'shopName'),ownerName:formValue(f,'ownerName'),phone:formValue(f,'phone'),address:formValue(f,'address'),vatRate:App.num(formValue(f,'vatRate')),gpTarget:App.num(formValue(f,'gpTarget')),reservePercent:App.num(formValue(f,'reservePercent')),gasUrl:formValue(f,'gasUrl'),bankAccounts,partners,fixedExpenses,dropdownMasters});toast('บันทึกตั้งค่าแล้ว','success');SETTINGS=await MockData.getSettings();render();};document.getElementById('backup').onclick=()=>{const data=JSON.stringify(MockData.exportBackup(),null,2);const blob=new Blob([data],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='maztech-garage-backup.json';a.click();URL.revokeObjectURL(a.href);};document.getElementById('reset-demo').onclick=()=>{if(confirm('ยืนยันรีเซ็ตข้อมูล Demo ทั้งหมด?')){MockData.resetDemoData();location.reload();}};}
</script></body></html>
