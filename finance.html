<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>รายรับ-รายจ่าย — Maztech Garage</title><link rel="stylesheet" href="styles.css"><script src="mock-data.js"></script><script src="app.js"></script></head><body><div class="app-shell" id="app"></div><script>
let CASH=[], ACC=[];
(async()=>{await load();render();})();
async function load(){CASH=await MockData.getCashflow();ACC=await MockData.getAccountBalances();}
function render(){const income=CASH.filter(x=>x.type==='in').reduce((s,x)=>s+Number(x.amount),0);const expense=CASH.filter(x=>x.type==='out').reduce((s,x)=>s+Number(x.amount),0);document.getElementById('app').innerHTML=`${renderSidebar('finance')}<div class="main-area">${renderTopbar([{label:'Maztech Garage',href:'dashboard.html'},{label:'รายรับ-รายจ่าย'}])}<main class="page-content"><div class="page-header"><div><div class="page-title">รายรับ-รายจ่าย</div><div class="page-sub">บันทึก Daily_Cashflow แบบ 2 บัญชี แยกบัญชีรับ/จ่าย พร้อมยอดคงเหลือปัจจุบัน</div></div><div class="header-actions"><button class="btn btn-primary" id="add-flow">+ บันทึกรายการ</button><button class="btn btn-outline" id="export-flow">Export CSV</button></div></div><div class="summary-strip">${ACC.map(a=>`<div class="summary-card" style="--sc-color:#1e6fc4"><div class="summary-val">${fmt.baht(a.balance)}</div><div class="summary-label">${a.name}</div></div>`).join('')}<div class="summary-card" style="--sc-color:#059669"><div class="summary-val">${fmt.baht(income)}</div><div class="summary-label">รายรับทั้งหมด</div></div><div class="summary-card" style="--sc-color:#dc2626"><div class="summary-val">${fmt.baht(expense)}</div><div class="summary-label">รายจ่ายทั้งหมด</div></div></div><div class="card"><div class="filter-panel"><div class="filter-row"><div class="filter-group"><label class="filter-label">ค้นหา</label><input class="filter-input" id="q" placeholder="หมวด / รายละเอียด / Job_ID"></div><div class="filter-group"><label class="filter-label">ประเภท</label><select class="filter-select" id="type"><option value="">ทั้งหมด</option><option value="in">รายรับ</option><option value="out">รายจ่าย</option></select></div></div></div></div><div id="slot">${table(CASH)}</div></main></div>`;wireGlobalSearch();wire();}
function table(rows){return`<div class="card table-wrap"><table class="data-table"><thead><tr><th>วันที่</th><th>บัญชี</th><th>ประเภท</th><th>หมวด</th><th>Ref</th><th>Job_ID</th><th>รายละเอียด</th><th>ช่องทาง</th><th>จำนวนเงิน</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${thaiDate(r.date)}</td><td>${accountName(r.accountId)}</td><td>${r.type==='in'?'<span class="badge badge-green">รับเข้า</span>':'<span class="badge badge-red">จ่ายออก</span>'}</td><td>${App.esc(r.category)}</td><td class="mono">${App.esc(r.refNo)}</td><td>${r.jobId?`<a class="job-no" href="job-detail.html?id=${r.jobId}">${r.jobId}</a>`:'—'}</td><td>${App.esc(r.description)}</td><td>${App.esc(r.channel)}</td><td class="text-right ${r.type==='in'?'positive':'text-red'}">${r.type==='in'?'+':'-'} ${fmt.baht(r.amount)}</td></tr>`).join('')||'<tr><td colspan="9" class="empty-state">ยังไม่มีรายการ</td></tr>'}</tbody></table></div>`}
function accountName(id){return (ACC.find(a=>a.id===id)||{}).name||id;}
function wire(){document.getElementById('add-flow').onclick=openFlow;document.getElementById('export-flow').onclick=()=>downloadCSV('maztech-cashflow.csv',CASH);document.getElementById('q').oninput=App.debounce(filter,120);document.getElementById('type').onchange=filter;}
function filter(){const q=App.text(document.getElementById('q').value).toLowerCase();const t=document.getElementById('type').value;const rows=CASH.filter(r=>(!t||r.type===t)&&(`${r.category} ${r.description} ${r.refNo} ${r.jobId}`.toLowerCase().includes(q)));document.getElementById('slot').innerHTML=table(rows);}
function openFlow(){openModal('บันทึกรายรับ-รายจ่าย',`<form id="flow-form" class="form-grid"><label class="form-field"><span>วันที่</span><input type="date" name="date" value="${App.todayISO()}"></label><label class="form-field"><span>บัญชี</span><select name="accountId">${ACC.map(a=>`<option value="${a.id}">${a.name}</option>`).join('')}</select></label><label class="form-field"><span>ประเภท</span><select name="type"><option value="in">รายรับ</option><option value="out">รายจ่าย</option></select></label><label class="form-field"><span>หมวด</span><input name="category" list="cat-list" placeholder="รายรับ-ค่าซ่อม / ต้นทุน-อะไหล่"><datalist id="cat-list"><option>รายรับ-ค่าซ่อม</option><option>รายรับ-มัดจำ</option><option>รายรับ-ขายอะไหล่</option><option>ต้นทุน-อะไหล่</option><option>ค่าเช่า</option><option>เงินเดือนช่าง</option><option>ค่าน้ำไฟ</option><option>ค่าโฆษณา-การตลาด</option><option>ค่าใช้จ่าย-อื่นๆ</option></datalist></label><label class="form-field"><span>Ref No</span><input name="refNo"></label><label class="form-field"><span>Job_ID</span><input name="jobId" placeholder="ถ้าเกี่ยวกับงานซ่อม"></label><label class="form-field"><span>จำนวนเงิน</span><input type="number" name="amount" required></label><label class="form-field"><span>ช่องทาง</span><select name="channel"><option>โอน/QR</option><option>เงินสด</option><option>EDC/K SHOP</option></select></label><label class="form-field full"><span>รายละเอียด</span><input name="description"></label></form>`,`<button class="btn btn-outline" data-close-modal>ยกเลิก</button><button class="btn btn-primary" id="save-flow">บันทึก</button>`);document.getElementById('save-flow').onclick=async()=>{const f=document.getElementById('flow-form');if(!f.reportValidity())return;MockData.addCashflow({date:formValue(f,'date'),accountId:formValue(f,'accountId'),type:formValue(f,'type'),category:formValue(f,'category'),refNo:formValue(f,'refNo'),jobId:formValue(f,'jobId'),description:formValue(f,'description'),amount:formNumber(f,'amount'),channel:formValue(f,'channel')});toast('บันทึกรายการแล้ว','success');closeModal();await load();render();};}
</script></body></html>
